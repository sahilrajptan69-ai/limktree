<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | My Socials</title>
    <meta name="description" content="All my social links in one sleek, 3D space.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <div class="card" id="tilt-card">
            <div class="card-content">
                <header class="profile-section">
                    <div class="avatar-container">
                        <img src="me.png" alt="Profile Avatar" class="avatar" id="profile-img">
                        <div class="avatar-glow"></div>
                    </div>
                    <h1 class="name"><i data-lucide="sparkles" class="name-icon"></i> SAHIL SINGH</h1>
                    <p class="bio">Digital Creator & Tech Enthusiast</p>
                </header>

                <nav class="links-section">
                    <a href="http://www.youtube.com/@RedRmycreation" class="link-card" target="_blank">
                        <div class="link-inner">
                            <img src="https://cdn.simpleicons.org/youtube/FF0000" class="brand-icon" alt="YouTube">
                            <span class="label">YouTube</span>
                            <i data-lucide="arrow-up-right" class="arrow"></i>
                        </div>
                    </a>
                    <a href="https://www.instagram.com/unfiltereditz?igsh=dmloY3o4b2JndnQ3" class="link-card" target="_blank">
                        <div class="link-inner">
                            <img src="https://cdn.simpleicons.org/instagram/E4405F" class="brand-icon" alt="Instagram">
                            <span class="label">Instagram</span>
                            <i data-lucide="arrow-up-right" class="arrow"></i>
                        </div>
                    </a>
                    <a href="https://t.me/+PzHl9j7iaUFlZTk1" class="link-card" target="_blank">
                        <div class="link-inner">
                            <img src="https://cdn.simpleicons.org/telegram/26A5E4" class="brand-icon" alt="Telegram">
                            <span class="label">Telegram</span>
                            <i data-lucide="arrow-up-right" class="arrow"></i>
                        </div>
                    </a>
                    <a href="https://whatsapp.com/channel/0029Vb7WjtnDp2Q0Gonid730" class="link-card" target="_blank">
                        <div class="link-inner">
                            <img src="https://cdn.simpleicons.org/whatsapp/25D366" class="brand-icon" alt="WhatsApp">
                            <span class="label">WhatsApp Channel</span>
                            <i data-lucide="arrow-up-right" class="arrow"></i>
                        </div>
                    </a>
                    <a href="https://www.facebook.com/share/1ReiZHj2Sy/" class="link-card" target="_blank">
                        <div class="link-inner">
                            <img src="https://cdn.simpleicons.org/facebook/1877F2" class="brand-icon" alt="Facebook">
                            <span class="label">Facebook</span>
                            <i data-lucide="arrow-up-right" class="arrow"></i>
                        </div>
                    </a>
                </nav>

                <footer class="footer">
                    <p>© 2024 • Built with ✨</p>
                </footer>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
